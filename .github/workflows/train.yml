name: K-Line Pattern YOLO Training

on:
  repository_dispatch:
    types: [train-yolo]
  workflow_dispatch:
    inputs:
      epochs:
        description: '训练轮数'
        required: false
        default: '150'
      imgsz:
        description: '图片尺寸'
        required: false
        default: '640'

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: none
      pull-requests: write
      id-token: none

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install ultralytics pillow tqdm

      - name: 验证数据集
        run: |
          echo "=== 验证数据集路径 ==="
          ls -la dataset/dataset.yaml
          ls dataset/images/train/*.png | wc -l
          ls dataset/images/val/*.png | wc -l
          ls dataset/labels/train/*.txt | wc -l
          echo "=== 验证YAML内容 ==="
          cat dataset/dataset.yaml

      - name: 下载预训练权重
        run: |
          python -c "from ultralytics import YOLO; model = YOLO('yolov8n.pt'); print('✓ 预训练权重 yolov8n.pt 下载成功')"

      - name: 训练模型
        run: |
          echo "=== 开始训练 ==="
          python train_kline.py --epochs ${{ github.event.inputs.epochs || '150' }} --imgsz ${{ github.event.inputs.imgsz || '640' }}

      - name: 上传训练结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yolo-train-results
          path: |
            runs/detect/train/
            weights/
          retention-days: 7

      - name: 发布权重
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: weights/best.pt
          tag_name: v1.0-kline
          name: K-Line YOLOv8n Pretrained Weight
          body: "K线形态识别YOLOv8n预训练权重，基于周线标注样本"

      - name: 上传到GitHub Pages
        if: success()
        run: |
          echo "YOLO训练完成！"
          ls -la weights/best.pt
