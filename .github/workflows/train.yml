name: K-Line Pattern YOLO Training

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'dataset/**'
      - '.github/workflows/**'

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖 + 下载预训练权重 + 训练
        run: |
          set -e
          pip install ultralytics pillow tqdm
          python -c "from ultralytics import YOLO; model = YOLO('yolov8n.pt'); print('预训练权重下载成功')"
          python train_kline.py --epochs 150 --imgsz 640

      - name: 上传训练结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yolo-train-results
          path: |
            runs/detect/train/
            weights/
          retention-days: 7

      - name: 发布权重
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: weights/best.pt
          tag_name: v1.0-kline
          name: K-Line YOLOv8n Pretrained Weight
          body: "K线形态识别YOLOv8n预训练权重，基于107张周线标注样本"
